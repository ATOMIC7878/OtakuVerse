<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>OtakuVerse | CS - Semester 3 Notes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
      :root {
        --primary-neon: #b84cff;
        --secondary-neon: #ff6b9d;
        --theory-color: #b84cff;
        --practical-color: #ff6b9d;
        --glass-bg: rgba(0, 0, 0, 0.45);
        --primary-glow: rgba(184, 76, 255, 0.3);
        --accent-blue: #00d4ff;
        --tagline-silver: #e0e0e0;
        --tagline-violet: #9d50bb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        background: #02020a;
        color: #ffffff;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* --- Cinematic Environment --- */
      .video-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -2;
      }

      #bg-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.4) saturate(1.2);
      }

      .video-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 50% 50%,
          transparent 10%,
          rgba(2, 2, 12, 0.85) 100%
        );
        z-index: -1;
      }

      /* --- Fixed Navbar Branding & Tagline --- */
      .navbar {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(25px) saturate(160%);
        -webkit-backdrop-filter: blur(25px) saturate(160%);
        border-bottom: 1px solid rgba(184, 76, 255, 0.2);
        padding: 0.8rem 0;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .brand-group {
        display: flex;
        flex-direction: column;
        padding-left: 5px;
      }

      .navbar-brand,
      .navbar-brand:hover,
      .navbar-brand:focus,
      .navbar-brand:active {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: clamp(1.1rem, 2.5vw, 1.4rem); /* Adaptive branding sizing */
        background: linear-gradient(
          135deg,
          var(--primary-neon),
          var(--secondary-neon)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent !important;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
        line-height: 1;
        transition: opacity 0.3s ease;
      }

      .navbar-brand:hover {
        opacity: 0.85;
        filter: drop-shadow(0 0 8px var(--primary-glow));
      }

      .navbar-brand i {
        color: var(--primary-neon);
        -webkit-text-fill-color: initial;
        background: linear-gradient(
          135deg,
          var(--primary-neon),
          var(--secondary-neon)
        );
        -webkit-background-clip: text;
        background-clip: text;
      }

      .navbar-tagline {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(0.45rem, 1.2vw, 0.55rem); /* Proportional scaling */
        letter-spacing: clamp(1.5px, 0.8vw, 3.5px);
        background: linear-gradient(
          90deg,
          var(--tagline-silver),
          var(--tagline-violet)
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 700;
        text-transform: uppercase;
        margin-top: 5px;
        filter: drop-shadow(0 0 5px rgba(157, 80, 187, 0.4));
      }

      .back-link {
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        font-family: "Orbitron", sans-serif;
        font-size: clamp(0.65rem, 1.5vw, 0.75rem);
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        white-space: nowrap;
      }

      .back-link:hover {
        color: var(--primary-neon);
        opacity: 1;
        transform: translateX(-5px);
        text-shadow: 0 0 10px var(--primary-glow);
      }

      main {
        margin-top: clamp(
          100px,
          12vw,
          125px
        ); /* Flexible spacing layout context */
        padding-bottom: 3rem;
      }

      /* --- Cinematic Hero --- */
      .semester-hero {
        text-align: center;
        margin-bottom: clamp(2rem, 6vw, 3.5rem);
      }

      .hero-title {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        background: linear-gradient(
          90deg,
          #fff,
          var(--primary-neon),
          var(--secondary-neon),
          #fff
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 8s linear infinite;
        font-size: clamp(
          1.8rem,
          5.5vw,
          3.5rem
        ); /* Smooth breakdown limits scale */
        letter-spacing: clamp(2px, 1vw, 4px);
      }

      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }

      .hero-subtitle {
        color: var(--accent-blue);
        letter-spacing: clamp(2px, 1vw, 6px);
        font-weight: 300;
        text-transform: uppercase;
        font-size: clamp(0.65rem, 1.5vw, 0.8rem);
        opacity: 0.8;
        padding: 0 10px;
      }

      /* --- Premium HUD Search Section --- */
      .search-section {
        background: var(--glass-bg);
        backdrop-filter: blur(20px) saturate(140%);
        border-radius: 24px;
        padding: clamp(1.2rem, 4vw, 1.8rem);
        margin-bottom: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      }

      .search-input {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        padding: clamp(0.8rem, 2.5vw, 1rem) 1.8rem;
        color: white;
        width: 100%;
        transition: all 0.3s ease;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(0.85rem, 2vw, 1rem);
      }

      .search-input:focus {
        outline: none;
        border-color: var(--primary-neon);
        box-shadow: 0 0 25px var(--primary-glow);
        background: rgba(0, 0, 0, 0.5);
      }

      .filter-group {
        display: flex;
        gap: clamp(8px, 1.5vw, 12px);
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .filter-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50px;
        padding: 0.6rem clamp(1rem, 2vw, 1.4rem);
        color: white;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        font-size: clamp(0.65rem, 1.5vw, 0.75rem);
        font-family: "Orbitron", sans-serif;
        letter-spacing: 1px;
        cursor: pointer;
        text-transform: uppercase;
        flex-grow: 1; /* Scales elements neatly across handheld frames */
        text-align: center;
        max-width: max-content;
      }

      .filter-btn.active {
        background: linear-gradient(
          135deg,
          var(--primary-neon),
          var(--secondary-neon)
        );
        border-color: transparent;
        box-shadow: 0 0 20px var(--primary-glow);
        transform: scale(1.05);
      }

      .filter-btn:hover:not(.active) {
        border-color: var(--primary-neon);
        background: rgba(184, 76, 255, 0.1);
        transform: translateY(-2px);
      }

      .reset-filters-btn {
        background: rgba(255, 71, 87, 0.1);
        border: 1px solid rgba(255, 71, 87, 0.3);
        color: #ff4757;
      }

      .reset-filters-btn:hover {
        background: #ff4757;
        color: white;
        box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
      }

      .filter-divider {
        width: 1px;
        height: 25px;
        background: rgba(255, 255, 255, 0.1);
        margin: 5px 5px;
      }

      /* --- High-Depth Subject Cards --- */
      .subject-card {
        background: rgba(5, 5, 15, 0.4);
        backdrop-filter: blur(25px);
        border-radius: 28px;
        padding: clamp(1.2rem, 4vw, 2.5rem);
        margin-bottom: 3rem;
        transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        border: 1px solid rgba(255, 255, 255, 0.08);
        position: relative;
        overflow: hidden;
      }

      .subject-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
          linear-gradient(
            90deg,
            rgba(255, 0, 0, 0.02),
            rgba(0, 255, 0, 0.01),
            rgba(0, 0, 255, 0.02)
          );
        z-index: 1;
        background-size:
          100% 4px,
          4px 100%;
        pointer-events: none;
      }

      .subject-card:hover {
        transform: translateY(-12px) scale(1.01);
        border-color: var(--primary-neon);
        box-shadow:
          0 40px 80px rgba(0, 0, 0, 0.8),
          0 0 30px rgba(184, 76, 255, 0.1);
      }

      .subject-card.major {
        border-left: 5px solid var(--primary-neon);
      }
      .subject-card.minor {
        border-left: 5px solid var(--secondary-neon);
      }

      .subject-title {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(1.1rem, 3vw, 1.6rem); /* Responsive title sizing */
        font-weight: 700;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 15px;
        color: #fff;
        z-index: 2;
        position: relative;
      }

      .subject-title-text {
        display: flex;
        align-items: center;
      }

      .subject-badge {
        font-family: "Orbitron", sans-serif;
        font-size: 0.6rem;
        padding: 0.4rem 1.2rem;
        border-radius: 4px;
        letter-spacing: 2px;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .badge-major {
        background: rgba(184, 76, 255, 0.1);
        border: 1px solid var(--primary-neon);
        color: var(--primary-neon);
        text-shadow: 0 0 10px rgba(184, 76, 255, 0.5);
      }

      .badge-minor {
        background: rgba(255, 107, 157, 0.05);
        border: 1px solid var(--secondary-neon);
        color: var(--secondary-neon);
        text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
      }

      /* --- Synchronized Enhanced Badges --- */
      .section-badge {
        font-family: "Orbitron", sans-serif;
        font-size: 0.65rem;
        padding: 0.5rem 1.4rem;
        border-radius: 4px;
        margin-bottom: 1.5rem;
        display: inline-block;
        letter-spacing: 2px;
        border-left: 3px solid var(--primary-neon);
        background: rgba(255, 255, 255, 0.03);
      }

      .theory-badge {
        color: #fff;
        border: 1px solid rgba(184, 76, 255, 0.8);
        box-shadow:
          0 0 15px rgba(184, 76, 255, 0.2),
          inset 0 0 10px rgba(184, 76, 255, 0.1);
      }

      .practical-badge {
        color: #fff;
        border: 1px solid rgba(255, 107, 157, 0.8);
        box-shadow:
          0 0 15px rgba(255, 107, 157, 0.2),
          inset 0 0 10px rgba(255, 107, 157, 0.1);
      }

      .section-badge i {
        font-size: 0.8rem;
        filter: drop-shadow(0 0 5px currentColor);
      }

      .theory-badge i {
        color: #b84cff;
      }
      .practical-badge i {
        color: #ff6b9d;
      }

      .doc-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        z-index: 2;
        position: relative;
      }

      .doc-item {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 16px;
        padding: clamp(1rem, 2.5vw, 1.2rem) 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 1px solid rgba(255, 255, 255, 0.05);
        gap: 15px;
      }

      .doc-item:hover {
        background: rgba(255, 255, 255, 0.06);
        transform: translateX(15px) scale(1.02);
        border-color: var(--primary-neon);
        box-shadow: -10px 0 20px rgba(184, 76, 255, 0.1);
      }

      .doc-info {
        flex: 1;
        min-width: 0; /* Enables text truncation safely */
      }
      .doc-name {
        font-weight: 600;
        font-size: clamp(0.9rem, 2vw, 1rem);
        margin-bottom: 4px;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .doc-meta {
        font-size: 0.7rem;
        opacity: 0.5;
        font-family: "Orbitron", sans-serif;
        letter-spacing: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* --- REQUIRED ACTION BUTTON FIX --- */
      .doc-actions {
        display: flex !important;
        flex-direction: row !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 12px !important;
        flex-shrink: 0 !important;
      }

      .doc-action-btn {
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
        cursor: pointer;
      }

      .read-btn {
        color: var(--accent-blue);
      }
      .read-btn:hover {
        background: var(--accent-blue);
        color: #fff;
        box-shadow: 0 0 20px var(--accent-blue);
        border: none;
      }

      .download-btn {
        color: var(--secondary-neon);
      }
      .download-btn:hover {
        background: var(--secondary-neon);
        color: #fff;
        box-shadow: 0 0 20px var(--secondary-neon);
        border: none;
      }

      .no-results {
        text-align: center;
        padding: 3rem 1rem;
        background: var(--glass-bg);
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* --- Cross Device Stacking Layout Media Injections --- */
      @media (max-width: 991px) {
        .filter-btn {
          max-width: 48%;
        }
      }

      @media (max-width: 768px) {
        .navbar-tagline {
          display: none;
        }
        .filter-btn {
          padding: 0.5rem 1rem;
          font-size: 0.7rem;
          max-width: 100%;
        }
        .filter-divider {
          display: none;
        }
        .doc-item {
          flex-direction: column;
          align-items: flex-start;
          gap: 1.2rem;
          padding: 1.2rem;
        }
        /* REQUIRED MOBILE FIX */
        .doc-actions {
          width: 100% !important;
          justify-content: flex-start !important;
          gap: 16px !important;
        }
        .doc-action-btn {
          flex-grow: 1;
          height: 45px;
        }
      }

      @media (max-width: 480px) {
        .brand-group {
          padding-left: 2px;
        }
        .subject-title {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        .subject-badge {
          align-self: flex-start;
        }
      }

      /* Ultra-wide Constraint Safeguard */
      @media (min-width: 1800px) {
        .container {
          max-width: 1440px;
        }
      }
    </style>
  </head>

          <div class="filter-group mt-3 justify-content-center">

            <button class="filter-btn" data-filter="other" data-type="subject">

            <button class="filter-btn" data-filter="practical" data-type="doc">
              PRACTICAL
            </button>
            <button class="filter-btn reset-filters-btn" id="resetFilters">
              <i class="fas fa-sync"></i>
            </button>
          </div>
        </div>

        <div id="subjectsContainer"></div>
      </div>
    </main>

      let activeFilters = { subjectType: "all", docType: "all" };
      let currentSearch = "";

      function readPDF(filename, title) {
        const pdfPath = "/assets/uploads/cs/sem3/" + filename;
        const viewerPath = "/pages/user/domain/cs/pdf-viewer.html";

        sessionStorage.setItem("pdf_viewer_file", pdfPath);
        sessionStorage.setItem("pdf_viewer_title", title);

        console.log("Data cached in SessionStorage. Opening viewer...");
        window.open(viewerPath, "_blank");
      }

      function downloadPDF(filename, title) {
        const pdfUrl = `/assets/uploads/cs/sem3/${filename}`;
        const link = document.createElement("a");
        link.href = pdfUrl;
        link.download = filename.split("/").pop();
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showNotification(`Downloading Data Asset: ${title}`, "success");
      }

      function showNotification(message, type) {
        const notification = document.createElement("div");
        notification.innerHTML = `<i class="fas fa-${type === "success" ? "bolt" : "exclamation-triangle"}"></i> ${message}`;
        notification.style.cssText = `
                position: fixed; bottom: 30px; right: 30px;
                background: ${type === "success" ? "rgba(184, 76, 255, 0.9)" : "rgba(255, 71, 87, 0.9)"};
                color: white; padding: 15px 30px; border-radius: 12px;
                z-index: 10000; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
                font-family: 'Space Grotesk', sans-serif; font-weight: 500;
                backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
                animation: fadeInUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            `;
        document.body.appendChild(notification);
        setTimeout(() => {
          notification.style.opacity = "0";
          setTimeout(() => notification.remove(), 400);
        }, 3000);
      }

      function renderContent() {
        const container = document.getElementById("subjectsContainer");
        let html = "";
        let hasResults = false;

        let filteredSubjects = subjectsData;
        if (activeFilters.subjectType !== "all") {
          const typeMap = { major: "major", minor: "minor", other: "normal" };
          filteredSubjects = subjectsData.filter(
            (s) => s.type === typeMap[activeFilters.subjectType],
          );
        }

        filteredSubjects.forEach((subject) => {
          let theoryItems = subject.theory.filter((i) =>
            i.title.toLowerCase().includes(currentSearch.toLowerCase()),
          );
          let practicalItems = subject.practical.filter((i) =>
            i.title.toLowerCase().includes(currentSearch.toLowerCase()),
          );

          if (activeFilters.docType === "theory") practicalItems = [];
          if (activeFilters.docType === "practical") theoryItems = [];

          if (theoryItems.length === 0 && practicalItems.length === 0) return;
          hasResults = true;

          const badge =
            subject.type === "major"
              ? '<span class="subject-badge badge-major"><i class="fas fa-star"></i> CORE_MAJOR</span>'
              : subject.type === "minor"
                ? '<span class="subject-badge badge-minor"><i class="fas fa-microchip"></i> ANALYSIS_MINOR</span>'
                : "";

          html += `
            <div class="subject-card">
                <h3 class="subject-title">
                  <span class="subject-title-text"><i class="fas ${subject.icon} me-3" style="color:var(--primary-neon)"></i>${subject.name.toUpperCase()}</span> 
                  ${badge}
                </h3>
                
                ${
                  theoryItems.length > 0
                    ? `
                    <div class="mb-4">
                        <span class="section-badge theory-badge"><i class="fas fa-book me-1"></i> THEORY NOTES (${theoryItems.length})</span>
                        <div class="doc-list">
                            ${theoryItems.map((doc) => renderDocRow(doc)).join("")}
                        </div>
                    </div>
                `
                    : ""
                }

                ${
                  practicalItems.length > 0
                    ? `
                    <div class="mt-2">
                        <span class="section-badge practical-badge"><i class="fas fa-code me-1"></i> PRACTICAL CODES (${practicalItems.length})</span>
                        <div class="doc-list">
                            ${practicalItems.map((doc) => renderDocRow(doc)).join("")}
                        </div>
                    </div>
                `
                    : ""
                }
            </div>
          `;
        });

        container.innerHTML = hasResults
          ? html
          : `
            <div class="no-results">
                <i class="fas fa-search-minus fa-3x mb-3" style="opacity: 0.2;"></i>
                <h4 style="font-family:'Orbitron'; letter-spacing:2px;">ZERO_RESULTS</h4>
                <p class="small opacity-50">Recalibrate scan parameters.</p>
            </div>`;
      }

      function renderDocRow(doc) {
        return `
            <div class="doc-item">
                <div class="doc-info">
                    <div class="doc-name" title="${doc.title}">${doc.title}</div>
                    <div class="doc-meta">MIME: PDF | CAPACITY: ${doc.size}</div>
                </div>
                <div class="doc-actions">
                    <button class="doc-action-btn read-btn" onclick="readPDF('${doc.filename}', '${doc.title}')" title="Initialize Stream">
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="doc-action-btn download-btn" onclick="downloadPDF('${doc.filename}', '${doc.title}')" title="Acquire Data">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
        `;
      }

      function toggleFilter(btn, filterValue, filterType) {
        document
          .querySelectorAll(`.filter-btn[data-type="${filterType}"]`)
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        activeFilters[filterType === "subject" ? "subjectType" : "docType"] =
          filterValue;
        renderContent();
      }

      document.getElementById("searchInput").addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderContent();
      });
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        if (btn.id === "resetFilters") return;
        btn.addEventListener("click", () =>
          toggleFilter(btn, btn.dataset.filter, btn.dataset.type),
        );
      });

      document.getElementById("resetFilters").addEventListener("click", () => {
        activeFilters = { subjectType: "all", docType: "all" };
        currentSearch = "";
        document.getElementById("searchInput").value = "";
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        document
          .querySelector('.filter-btn[data-filter="all"][data-type="subject"]')
          .classList.add("active");
        renderContent();
      });

      window.onload = renderContent;

      anime({
        targets: ".subject-card",
        translateY: [60, 0],
        opacity: [0, 1],
        scale: [0.95, 1],
        delay: anime.stagger(150),
        duration: 1200,
        easing: "easeOutElastic(1, .8)",
      });
    </script>
